# ==============================================================================
# Tola Configuration
# ==============================================================================

[site.info]
title = "My Blog"
author = "Your Name"
email = "you@example.com"
description = "A blog built with Typst and Tola"
language = "en"
url = "https://tola-ssg.github.io/example-sites/starter"

[site.info.extra]

[site.header]
# icon = "assets/images/favicon.ico"
# styles = ["assets/styles/custom.css"]
# scripts = [{ path = "assets/scripts/app.js", defer = true }]
elements = ['<meta name="darkreader-lock">']

[site.nav]
spa = true
transition = {style = "fade", time = 200}
preload = {enable = false, delay = 200}

[site.seo]
auto_og = true

[site.seo.feed]
enable = false

[site.seo.sitemap]
enable = false
path = "sitemap.xml"

[build]
content = "content"
output = "public"
minify = true
deps = ["templates", "utils", "components"]

[build.assets]
nested = [
  "assets/images",
  "assets/styles",
  "assets/fonts"
]

[build.slug]
path = "safe"
fragment = "full"
separator = "dash"
case = "lower"

# Tailwind CSS - enabled by default in this template
# Make sure tailwindcss is installed: npm install -g tailwindcss
[build.hooks.css]
enable = true
path = "assets/styles/tailwind.css"
command = ["tailwindcss"]


[serve]
interface = "127.0.0.1"
port = 5277
watch = true
